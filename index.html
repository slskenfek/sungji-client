<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>성지</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.js"></script>
  </head>
  <body>
    <div class="shell">
      <main class="game-shell">
        <header class="hero">
          <p class="eyebrow">Phaser.js Prototype</p>
          <h1>아이디</h1>
          <p class="summary">성지키기 play!</p>
        </header>
        <div id="game-root"></div>
      </main>

      <aside class="panel">
        <section class="card">
          <h2>조작</h2>
          <ul>
            <li><span>이동</span><strong>WASD / 방향키</strong></li>
            <li><span>대시 느낌</span><strong>Shift + 이동</strong></li>
            <li><span>공격</span><strong>자동 기본공격</strong></li>
          </ul>
        </section>

        <section class="card">
          <h2>능력치</h2>
          <ul>
            <li><span>직업</span><strong id="stat-class">전사</strong></li>
            <li><span>공속 단계</span><strong id="stat-attack-tier">1.0</strong></li>
            <li><span>공격속도</span><strong id="stat-attack-speed">1.0</strong></li>
            <li><span>데미지</span><strong id="stat-damage">10</strong></li>
            <li><span>힘</span><strong id="stat-strength">5</strong></li>
            <li><span>덱스</span><strong id="stat-dexterity">2</strong></li>
            <li><span>지식</span><strong id="stat-knowledge">1</strong></li>
            <li><span>방어</span><strong id="stat-defense">7</strong></li>
          </ul>
        </section>

        <section class="card">
          <h2>현재 목표</h2>
          <p>방 입장 후 끝없이 몰려오는 몬스터를 정리하고, 레벨업 후 최종 보스를 처치해 클리어합니다.</p>
        </section>
      </aside>
    </div>

    <script defer src="./src/config/game-config.js"></script>
    <script defer src="./src/systems/leveling.js"></script>
    <script defer src="./src/entities/textures.js"></script>
    <script defer src="./src/ui/hud.js"></script>
    <script defer src="./src/scenes/dungeon-scene.js"></script>
    <script defer src="./src/main.js"></script>
  </body>
</html>
