<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>성지</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.js"></script>
  </head>
  <body>
    <div class="shell">
      <main class="game-shell">
        <header class="hero">
          <p class="eyebrow">Phaser.js Prototype</p>
          <h1>Dungeon Survivors</h1>
          <p class="summary">HUD가 가려지지 않도록 게임을 전면에 두고, 설명은 하단 정보 패널로 분리했습니다.</p>
        </header>
        <div id="game-root"></div>
      </main>

      <aside class="panel">
        <section class="card">
          <h2>조작</h2>
          <ul>
            <li><span>이동</span><strong>WASD / 방향키</strong></li>
            <li><span>대시 느낌</span><strong>Shift + 이동</strong></li>
            <li><span>공격</span><strong>자동 기본공격</strong></li>
          </ul>
        </section>

        <section class="card">
          <h2>현재 빌드</h2>
          <ul>
            <li><span>직업</span><strong>전사</strong></li>
            <li><span>공속 단계</span><strong>1 / 10</strong></li>
            <li><span>몬스터</span><strong>랜덤 생성</strong></li>
          </ul>
        </section>

        <section class="card">
          <h2>현재 목표</h2>
          <p>방 입장 후 끝없이 몰려오는 몬스터를 정리하고, 레벨업 후 최종 보스를 처치해 클리어합니다.</p>
        </section>
      </aside>
    </div>

    <script defer src="./src/config/game-config.js"></script>
    <script defer src="./src/systems/leveling.js"></script>
    <script defer src="./src/entities/textures.js"></script>
    <script defer src="./src/ui/hud.js"></script>
    <script defer src="./src/scenes/dungeon-scene.js"></script>
    <script defer src="./src/main.js"></script>
  </body>
</html>
